<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fffdf8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #ec8120;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
        }
		h4 {
			margin-bottom: 0;
			margin-top: 10px;
		}
        input[type="text"],
        input[type="password"],
        input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
		
        input[type="submit"] {
            background-color: #044c86;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #044ca6;
        }
        .create-account {
            text-align: center;
            margin-top: 10px;
        }

        .create-account a {
            color: #007bff;
            text-decoration: none;
        }

        .create-account a:hover {
            text-decoration: underline;
        }
        
        .error-box {
            background-color: #ffcccc; /* Red background color */
            color: #cc0000; /* Red text color */
            padding: 10px; /* Padding inside the box */
            margin-bottom: 10px; /* Margin at the bottom to separate from other elements */
            border: 1px solid #cc0000; /* Red border */
            border-radius: 5px; /* Rounded corners */
        }
    </style>
    
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form action="login" method="post">
        <h4>
            <label for="username">Username</label>
        </h4>
        <input type="text" name="username"/>
		<h4 style="margin-bottom: 0;">
            <label for="password">Password</label>
        </h4>
        <input type="password" name="password"/>
		<div th:if="${errorMessage}" class="error-box">
        <p th:text="${errorMessage}"></p>
    </div>
            <input type="submit" value="Login">
        </form>
        <div class="create-account">
            <p>Don't have an account? <a style="color: #044c86" href="/createAccount"><br>Create New Account</a></p>
        </div>
        
    </div>
      
</body>
</html>
