<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make A Book Offer Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fffdf8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #ec8120;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
        }
		h4 {
			margin-bottom: 0;
			margin-top: 10px;
		}
        input[type="text"],
        input[type="password"],
        input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            background-color: #044c86;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #044ca6;
        }
        .error-box {
            background-color: #ffcccc; /* Red background color */
            color: #cc0000; /* Red text color */
            padding: 10px; /* Padding inside the box */
            margin-bottom: 10px; /* Margin at the bottom to separate from other elements */
            border: 1px solid #cc0000; /* Red border */
            border-radius: 5px; /* Rounded corners */
        }
    </style>
    <script>
    	function moveCursorToEnd() {
        	var textarea = document.getElementsByName("summary")[0];
        	var cursorPosition = textarea.selectionStart + textarea.selectionEnd;
        	var textLength = textarea.value.length;
        	if(cursorPosition == textLength){
        		textarea.setSelectionRange(textLength, textLength);
        	}
        	
    	}
	</script>
</head>
<body>
    <div class="container">
        <h2>Make a Book Offer</h2>
        <form action="/addOffer" method="post">
        	<h4>
    			<label for="title">Title</label>
			</h4>
			<input type="text" name="title" style="margin-top: 0;" required/>

            <h4>
            	<label for="authors">Authors</label>
            </h4>
            <input type="text" name="authors" style="margin-top: 0;" required/>
            
			<h4>
            	<label for="category">Category</label><br>
            </h4>
            <input type="radio" name="category" value="Action"/>
            <label for="action">Action</label><br>
            <input type="radio" name="category" value="Drama"/>
            <label for="drama">Drama</label><br>
            <input type="radio" name="category" value="Comedy"/>
            <label for="comedy">Comedy</label><br>
            <input type="radio" name="category" value="Fantasy"/>
            <label for="fantasy">Fantasy</label><br>
            <input type="radio" name="category" value="Horror"/>
            <label for="horror">Horror</label><br>
            <input type="radio" name="category" value="Mystery"/>
            <label for="mystery">Mystery</label><br>
            <input type="radio" name="category" value="Romance"/>
            <label for="romance">Romance</label><br>
            <input type="radio" name="category" value="Thriller"/>
            <label for="thriller">Thriller</label><br>
            <input type="radio" name="category" value="Biography"/>
            <label for="biography">Biography</label><br>
            <input type="radio" name="category" value="Science Fiction"/>
            <label for="sciencefiction">Science fiction</label><br>
            <input type="radio" name="category" value="Adventure"/>
            <label for="adventure">Adventure</label><br>
            <input type="radio" name="category" value="Historical"/>
            <label for="historical">Historical</label><br>
            
            <h4>
    			<label for="summary">Summary</label><br>
			</h4>
			<textarea name="summary" rows="10" cols="35" onclick="moveCursorToEnd()"></textarea>


			 
			    
			    
						
            <input type="submit" action="homePage" method="get" value="Add Offer">
            
        </form>
       
        <div th:if="${errorMessage}" class="error-box">
            	<form action="homePage" method="get">
					<p th:text="${errorMessage}"></p>
					<input type="submit" action="homePage" method="get" value="Return to homepage">
            	</form>
        </div>
			       
		
			
    </div>
</body>
</html>
